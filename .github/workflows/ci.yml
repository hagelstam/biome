name: CI
on: [push, pull_request]
defaults:
  run:
    shell: bash
    working-directory: ./cloudflare

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true
          cache_dependency_path: |
            cloudflare/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc
      - run: pnpm fmt:check
